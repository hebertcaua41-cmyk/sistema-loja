<!DOCTYPE html>
<button onclick="voltar()">⬅ Voltar</button>
<html>
<head>
    <title>Login - Sistema Loja</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111827;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #1e40af;
        }

        .error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb"><body>

<div class="login-box">
    <h2>🔐 Sistema Loja</h2>

    <input type="text" id="usuario" placeholder="Usuário">
    <input type="password" id="senha" placeholder="Senha">

    <button onclick="login()">Entrar</button>

    <p class="error" id="erro"></p>
</div>

<script>
function login() {
    const usuario = document.getElementById('usuario').value;
    const senha = document.getElementById('senha').value;

    // 👇 LOGIN FIXO (podemos depois colocar no banco)
    if (usuario === "admin" && senha === "1234") {
        localStorage.setItem("logado", "sim");
        window.location.href = "dashboard.html";
    } else {
        document.getElementById('erro').innerText = "Usuário ou senha inválidos!";
    }
}
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .then(() => console.log('Service Worker registrado'));
}
</script>
</body>
</html>
function voltar() {
  window.location.href = "/";
}
