<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel HS Cell</title>
<style>
body{background:#0f172a;color:white;font-family:Arial;margin:0}
header{background:#1e293b;padding:15px;text-align:center}
section{padding:20px}
.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}
input,button{
  padding:8px;
  margin:5px 0;
  border:none;
  border-radius:5px;
}
button{background:#22c55e;color:white;cursor:pointer}
.meta{font-size:18px;font-weight:bold}
</style>
</head>
<body>

<header>
<h2>HS CELL IMPORTS - Painel</h2>
<button onclick="logout()" style="background:red">Sair</button>
</header>

<section>

<div class="card">
<h3>📋 Nova Ordem de Serviço</h3>
<input id="cliente" placeholder="Cliente">
<input id="aparelho" placeholder="Aparelho">
<input id="problema" placeholder="Problema">
<input id="valor" type="number" placeholder="Valor">
<button onclick="criarOS()">Salvar OS</button>
</div>

<div class="card">
<h3>📊 Meta Mensal</h3>
<div class="meta">Meta: R$ 5000</div>
<div id="totalMes"></div>
</div>

<div class="card">
<h3>📋 Ordens de Serviço</h3>
<div id="listaOS"></div>
</div>

</section>

<script src="/js/sistema.js"></script>

</body>
</html>
