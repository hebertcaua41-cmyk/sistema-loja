<!DOCTYPE html>
<html>
<head>
    <title>Ordem de Serviço</title>
</head>
<body>

<h2>🛠 Criar Ordem de Serviço</h2>

<form id="formOS">
    Cliente: <input type="text" id="cliente" required><br><br>
    Aparelho: <input type="text" id="aparelho" required><br><br>
    Defeito: <input type="text" id="defeito" required><br><br>
    Valor: <input type="number" id="valor" required><br><br>
    <button type="submit">Criar OS</button>
</form>

<h3>📋 Lista de OS</h3>
<ul id="listaOS"></ul>

<script>
async function carregarOS() {
    const res = await fetch('/os');
    const dados = await res.json();
    
    const lista = document.getElementById('listaOS');
    lista.innerHTML = '';

    dados.forEach(os => {
        lista.innerHTML += `
            <li>
                ${os.cliente} - ${os.aparelho} - R$ ${os.valor}
                <button onclick="concluirOS('${os._id}')">Concluir</button>
                <button onclick="deletarOS('${os._id}')">Excluir</button>
            </li>
        `;
    });
}

document.getElementById('formOS').addEventListener('submit', async (e) => {
    e.preventDefault();

    await fetch('/os', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            cliente: cliente.value,
            aparelho: aparelho.value,
            defeito: defeito.value,
            valor: valor.value,
            status: "Aberto"
        })
    });

    carregarOS();
});

async function deletarOS(id) {
    await fetch('/os/' + id, { method: 'DELETE' });
    carregarOS();
}

async function concluirOS(id) {
    await fetch('/os/' + id, {
        method: 'PUT'
    });
    carregarOS();
}

carregarOS();
</script>

</body>
</html>
