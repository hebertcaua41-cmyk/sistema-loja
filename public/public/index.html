<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HS CELL IMPORTS</title>
<style>
body { background:#0f172a; color:white; font-family:Arial; padding:20px }
h1 { color:#22d3ee }
.card { background:#1e293b; padding:15px; border-radius:10px; margin-bottom:15px }
button { padding:8px 12px; border:none; border-radius:6px; cursor:pointer; background:#22d3ee }
.status { padding:5px 10px; border-radius:6px; font-size:12px }
input { margin:5px 0; padding:8px; width:100%; border-radius:6px; border:none }
</style>
</head>
<body>

<h1>📱 HS CELL IMPORTS</h1>

<div class="card">
<h3>Nova Ordem de Serviço</h3>
<input id="cliente" placeholder="Cliente">
<input id="telefone" placeholder="Telefone">
<input id="aparelho" placeholder="Aparelho">
<input id="defeito" placeholder="Defeito">
<input id="valorServico" placeholder="Valor Serviço">
<input id="custoPeca" placeholder="Custo Peça">
<button onclick="criarOrdem()">Salvar</button>
</div>

<div id="lista"></div>

<script>
async function carregar() {
  const res = await fetch("/ordens");
  const dados = await res.json();
  const lista = document.getElementById("lista");
  lista.innerHTML = "";
  dados.forEach(o => {
    const lucro = o.valorServico - o.custoPeca;
    lista.innerHTML += `
      <div class="card">
        <b>${o.cliente}</b> - ${o.aparelho}<br>
        Defeito: ${o.defeito}<br>
        Valor: R$ ${o.valorServico} | Lucro: R$ ${lucro}<br>
        Status: ${o.status}
      </div>
    `;
  });
}

async function criarOrdem() {
  await fetch("/ordens", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      cliente: cliente.value,
      telefone: telefone.value,
      aparelho: aparelho.value,
      defeito: defeito.value,
      valorServico: Number(valorServico.value),
      custoPeca: Number(custoPeca.value)
    })
  });
  carregar();
}

carregar();
</script>

</body>
</html>
