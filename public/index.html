<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HS Cell Imports</title>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9}
header{background:#111;color:#fff;padding:15px;text-align:center;font-size:20px}
nav{background:#222;display:flex;flex-wrap:wrap;gap:5px;padding:10px;justify-content:center}
nav button{background:#00c853;border:none;padding:8px 12px;color:white;font-weight:bold;border-radius:5px;cursor:pointer}
section{display:none;padding:20px}
section.active{display:block}
input,select{width:100%;padding:8px;margin:5px 0}
button.salvar{background:#2196f3;color:white;padding:10px;border:none;width:100%;margin-top:10px;font-weight:bold}
table{width:100%;border-collapse:collapse;margin-top:15px}
th,td{border:1px solid #ccc;padding:6px;text-align:center;font-size:14px}
th{background:#eee}
.acao{padding:4px 6px;border:none;color:white;border-radius:4px;cursor:pointer}
.pdf{background:#673ab7}
.excluir{background:#e53935}
</style>
</head>
<body>

<header>📱 HS Cell Imports - Sistema Profissional</header>

<nav>
<button onclick="abrir('os')">Nova OS</button>
<button onclick="abrir('listaOS')">Lista OS</button>
<button onclick="abrir('estoque')">Estoque</button>
<button onclick="abrir('venda')">Nova Venda</button>
<button onclick="abrir('listaVendas')">Vendas</button>
</nav>

<!-- OS -->
<section id="os" class="active">
<h3>Nova Ordem de Serviço</h3>
<input id="cliente" placeholder="Cliente">
<input id="telefone" placeholder="Telefone">
<input id="aparelho" placeholder="Aparelho">
<input id="defeito" placeholder="Defeito">
<input id="valor" type="number" placeholder="Valor">
<input id="garantia" placeholder="Garantia">
<select id="status">
<option>Em andamento</option>
<option>Pronto</option>
<option>Entregue</option>
</select>
<button class="salvar" onclick="salvarOS()">Salvar OS</button>
</section>

<section id="listaOS">
<h3>Ordens de Serviço</h3>
<table>
<thead>
<tr><th>Cliente</th><th>Aparelho</th><th>Valor</th><th>Status</th><th>Ações</th></tr>
</thead>
<tbody id="tabelaOS"></tbody>
</table>
</section>

<!-- ESTOQUE -->
<section id="estoque">
<h3>Cadastro de Produto</h3>
<input id="produto" placeholder="Produto">
<input id="quantidade" type="number" placeholder="Quantidade">
<input id="preco" type="number" placeholder="Preço unitário">
<button class="salvar" onclick="salvarEstoque()">Salvar Produto</button>

<h3>Lista Estoque</h3>
<table>
<thead>
<tr><th>Produto</th><th>Qtd</th><th>Preço</th></tr>
</thead>
<tbody id="tabelaEstoque"></tbody>
</table>
</section>

<!-- VENDA -->
<section id="venda">
<h3>Nova Venda</h3>
<input id="clienteVenda" placeholder="Cliente">
<input id="produtoVenda" placeholder="Produto">
<input id="quantidadeVenda" type="number" placeholder="Quantidade">
<button class="salvar" onclick="gerarVenda()">Finalizar Venda</button>
</section>

<section id="listaVendas">
<h3>Histórico de Vendas</h3>
<table>
<thead>
<tr><th>Cliente</th><th>Produto</th><th>Qtd</th><th>Total</th></tr>
</thead>
<tbody id="tabelaVendas"></tbody>
</table>
</section>

<script>

function abrir(sec){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(sec).classList.add("active");
}

/* ================= OS ================= */

async function salvarOS(){
const dados={
cliente:cliente.value,
telefone:telefone.value,
aparelho:aparelho.value,
defeito:defeito.value,
valor:Number(valor.value),
garantia:garantia.value,
status:status.value
};
await fetch("/os",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(dados)});
alert("OS salva!");
carregarOS();
}

async function carregarOS(){
const res=await fetch("/os");
const lista=await res.json();
tabelaOS.innerHTML="";
lista.forEach(os=>{
tabelaOS.innerHTML+=`
<tr>
<td>${os.cliente}</td>
<td>${os.aparelho}</td>
<td>R$ ${os.valor}</td>
<td>${os.status}</td>
<td>
<button class="acao pdf" onclick="window.open('/os/${os._id}/pdf')">PDF</button>
<button class="acao excluir" onclick="excluirOS('${os._id}')">X</button>
</td>
</tr>`;
});
}

async function excluirOS(id){
await fetch("/os/"+id,{method:"DELETE"});
carregarOS();
}

/* ================= ESTOQUE ================= */

async function salvarEstoque(){
const dados={
produto:produto.value,
quantidade:Number(quantidade.value),
preco:Number(preco.value)
};
await fetch("/estoque",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(dados)});
alert("Produto salvo!");
carregarEstoque();
}

async function carregarEstoque(){
const res=await fetch("/estoque");
const lista=await res.json();
tabelaEstoque.innerHTML="";
lista.forEach(p=>{
tabelaEstoque.innerHTML+=`
<tr>
<td>${p.produto}</td>
<td>${p.quantidade}</td>
<td>R$ ${p.preco}</td>
</tr>`;
});
}

/* ================= VENDA ================= */

async function gerarVenda(){
const dados={
cliente:clienteVenda.value,
produto:produtoVenda.value,
quantidade:Number(quantidadeVenda.value)
};
const res=await fetch("/venda",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(dados)});
const r=await res.json();
if(r.erro){alert(r.erro);return;}
alert("Venda realizada! Total: R$ "+r.total);
carregarEstoque();
carregarVendas();
}

async function carregarVendas(){
const res=await fetch("/vendas");
const lista=await res.json();
tabelaVendas.innerHTML="";
lista.forEach(v=>{
tabelaVendas.innerHTML+=`
<tr>
<td>${v.cliente}</td>
<td>${v.produto}</td>
<td>${v.quantidade}</td>
<td>R$ ${v.total}</td>
</tr>`;
});
}

window.onload=function(){
carregarOS();
carregarEstoque();
carregarVendas();
}

</script>
</body>
</html>
