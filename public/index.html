<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>HS CELL IMPORTS</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f172a">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#0f172a;color:white;padding:20px}
h1{text-align:center;margin-bottom:20px;color:#38bdf8}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px}
.card{background:#1e293b;padding:20px;border-radius:12px}
input,button{width:100%;padding:10px;margin-bottom:10px;border:none;border-radius:8px}
input{background:#334155;color:white}
button{background:#22c55e;color:white;font-weight:bold;cursor:pointer}
.list-item{background:#334155;padding:10px;border-radius:8px;margin-bottom:8px}
</style>
</head>
<body>

<h1>📱 HS CELL IMPORTS</h1>

<div class="container">

<div class="card">
<h2>📦 Estoque</h2>
<input id="nome" placeholder="Produto">
<input id="quantidade" type="number" placeholder="Quantidade">
<input id="custo" type="number" placeholder="Custo unitário">
<button onclick="addEstoque()">Adicionar</button>
<div id="listaEstoque"></div>
</div>

<div class="card">
<h2>🛒 Venda</h2>
<input id="cliente" placeholder="Cliente">
<input id="produto" placeholder="Produto (igual estoque)">
<input id="qtdVenda" type="number" placeholder="Quantidade">
<input id="valorVenda" type="number" placeholder="Valor unitário">
<button onclick="addVenda()">Registrar Venda</button>
<div id="listaVendas"></div>
</div>

</div>

<script>
const API = window.location.origin;

/* ESTOQUE */
async function addEstoque(){
 await fetch(`${API}/estoque`,{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({
     nome:nome.value,
     quantidade:Number(quantidade.value),
     custoUnitario:Number(custo.value)
   })
 });
 carregarEstoque();
}

async function carregarEstoque(){
 const res=await fetch(`${API}/estoque`);
 const dados=await res.json();
 listaEstoque.innerHTML="";
 dados.forEach(p=>{
   listaEstoque.innerHTML+=`
   <div class="list-item">
   ${p.nome} | Qtd: ${p.quantidade}
   </div>`;
 });
}

/* VENDA */
async function addVenda(){
 const res=await fetch(`${API}/vendas`,{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify({
     cliente:cliente.value,
     produto:produto.value,
     quantidade:Number(qtdVenda.value),
     valorUnitario:Number(valorVenda.value)
   })
 });

 const venda=await res.json();
 if(venda.erro){alert(venda.erro);return;}

 carregarEstoque();
 carregarVendas();
}

async function carregarVendas(){
 const res=await fetch(`${API}/vendas`);
 const dados=await res.json();
 listaVendas.innerHTML="";
 dados.forEach(v=>{
   listaVendas.innerHTML+=`
   <div class="list-item">
   ${v.cliente} - ${v.produto} | R$ ${v.total}
   </div>`;
 });
}

carregarEstoque();
carregarVendas();

/* REGISTRAR SERVICE WORKER */
if("serviceWorker" in navigator){
 navigator.serviceWorker.register("/service-worker.js");
}
</script>

</body>
</html>
