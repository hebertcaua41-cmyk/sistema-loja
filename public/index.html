<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HS Cell Imports - Sistema</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

header{
  background:#1e293b;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

nav{
  display:flex;
  justify-content:space-around;
  background:#111827;
  padding:10px;
}

nav button{
  background:none;
  border:none;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.container{
  padding:20px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:8px;
  margin-bottom:20px;
}

input, select{
  width:100%;
  padding:8px;
  margin:5px 0;
  border:none;
  border-radius:5px;
}

button.action{
  background:#22c55e;
  color:white;
  padding:8px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  margin-top:5px;
}

button.delete{
  background:#ef4444;
  color:white;
  padding:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.hidden{
  display:none;
}
</style>
</head>
<body>

<header>🔥 HS Cell Imports - Sistema</header>

<div id="login" class="container">
  <div class="card">
    <h3>Login</h3>
    <input id="username" placeholder="Usuário">
    <input id="password" type="password" placeholder="Senha">
    <button class="action" onclick="login()">Entrar</button>
  </div>
</div>

<div id="sistema" class="hidden">

<nav>
  <button onclick="mostrar('dashboard')">Dashboard</button>
  <button onclick="mostrar('os')">OS</button>
  <button onclick="mostrar('estoque')">Estoque</button>
  <button onclick="mostrar('despesas')">Despesas</button>
  <button onclick="logout()">Sair</button>
</nav>

<div class="container">

<!-- DASHBOARD -->
<div id="dashboard" class="secao">
  <div class="card">
    <h3>📊 Dashboard</h3>
    <p>Vendas mês: R$ <span id="vendas">0</span></p>
    <p>Despesas mês: R$ <span id="despesasTotal">0</span></p>
    <p>Lucro: R$ <span id="lucro">0</span></p>
    <p>Meta: R$ 5000</p>
  </div>
</div>

<!-- ORDEM SERVIÇO -->
<div id="os" class="secao hidden">
  <div class="card">
    <h3>Nova OS</h3>
    <input id="cliente" placeholder="Cliente">
    <input id="telefone" placeholder="Telefone">
    <input id="aparelho" placeholder="Aparelho">
    <input id="defeito" placeholder="Defeito">
    <input id="valor" type="number" placeholder="Valor">
    <input id="garantia" placeholder="Garantia">
    <button class="action" onclick="criarOS()">Salvar</button>
  </div>
  <div id="listaOS"></div>
</div>

<!-- ESTOQUE -->
<div id="estoque" class="secao hidden">
  <div class="card">
    <h3>Novo Produto</h3>
    <input id="nomeProduto" placeholder="Nome">
    <input id="quantidade" type="number" placeholder="Quantidade">
    <input id="precoVenda" type="number" placeholder="Preço Venda">
    <button class="action" onclick="criarProduto()">Salvar</button>
  </div>
  <div id="listaEstoque"></div>
</div>

<!-- DESPESAS -->
<div id="despesas" class="secao hidden">
  <div class="card">
    <h3>Nova Despesa</h3>
    <input id="descDespesa" placeholder="Descrição">
    <input id="valorDespesa" type="number" placeholder="Valor">
    <button class="action" onclick="criarDespesa()">Salvar</button>
  </div>
</div>

</div>
</div>

<script>

function mostrar(secao){
  document.querySelectorAll(".secao").forEach(s=>s.classList.add("hidden"));
  document.getElementById(secao).classList.remove("hidden");
}

function logout(){
  location.reload();
}

async function login(){
  const res = await fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:username.value,
      password:password.value
    })
  });

  const data = await res.json();

  if(data.token){
    loginDiv = document.getElementById("login");
    loginDiv.classList.add("hidden");
    document.getElementById("sistema").classList.remove("hidden");
    carregarDashboard();
    carregarOS();
    carregarEstoque();
  } else {
    alert(data.message);
  }
}

/* ================= OS ================= */

async function criarOS(){
  await fetch("/os",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      cliente:cliente.value,
      telefone:telefone.value,
      aparelho:aparelho.value,
      defeito:defeito.value,
      valor:Number(valor.value),
      garantia:garantia.value
    })
  });
  carregarOS();
  carregarDashboard();
}

async function carregarOS(){
  const res = await fetch("/os");
  const lista = await res.json();
  const div = document.getElementById("listaOS");
  div.innerHTML="";
  lista.forEach(os=>{
    div.innerHTML+=`
      <div class="card">
        <b>${os.cliente}</b> - ${os.aparelho}
        <br>R$ ${os.valor}
        <br>
        <button class="delete" onclick="window.open('/os/${os._id}/pdf')">PDF</button>
      </div>
    `;
  });
}

/* ================= ESTOQUE ================= */

async function criarProduto(){
  await fetch("/estoque",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      nome:nomeProduto.value,
      quantidade:Number(quantidade.value),
      precoVenda:Number(precoVenda.value)
    })
  });
  carregarEstoque();
}

async function carregarEstoque(){
  const res = await fetch("/estoque");
  const lista = await res.json();
  const div = document.getElementById("listaEstoque");
  div.innerHTML="";
  lista.forEach(p=>{
    div.innerHTML+=`
      <div class="card">
        ${p.nome} - Estoque: ${p.quantidade}
        <br>R$ ${p.precoVenda}
        <br>
        <button class="action" onclick="vender('${p._id}', ${p.quantidade})">Vender 1</button>
      </div>
    `;
  });
}

/* ===== BAIXA AUTOMÁTICA DE ESTOQUE ===== */

async function vender(id, qtdAtual){
  if(qtdAtual <= 0){
    alert("Sem estoque!");
    return;
  }

  await fetch("/estoque/"+id,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      quantidade:qtdAtual - 1
    })
  });

  carregarEstoque();
  alert("Venda realizada!");
}

/* ================= DESPESAS ================= */

async function criarDespesa(){
  await fetch("/despesas",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      descricao:descDespesa.value,
      valor:Number(valorDespesa.value)
    })
  });
  carregarDashboard();
}

/* ================= DASHBOARD ================= */

async function carregarDashboard(){
  const res = await fetch("/dashboard");
  const data = await res.json();

  document.getElementById("vendas").innerText = data.vendas;
  document.getElementById("despesasTotal").innerText = data.despesas;
  document.getElementById("lucro").innerText = data.lucro;
}

</script>

</body>
</html>
