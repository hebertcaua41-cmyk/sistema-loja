<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HS Cell Imports - Sistema</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  padding:20px;
}
h1{
  text-align:center;
}
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}
.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
}
input,select,button{
  width:100%;
  padding:8px;
  margin:5px 0;
  border:none;
  border-radius:5px;
}
button{
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
button:hover{
  opacity:0.8;
}
.list-item{
  background:#334155;
  padding:8px;
  margin:5px 0;
  border-radius:5px;
}
.dashboard{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}
.dashboard div{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  width:23%;
  text-align:center;
}
</style>
</head>

<body>

<h1>📱 HS CELL IMPORTS</h1>

<div class="dashboard">
  <div>OS: <span id="dashOS">0</span></div>
  <div>Vendas: R$ <span id="dashVendas">0</span></div>
  <div>Despesas: R$ <span id="dashDespesas">0</span></div>
  <div>Lucro: R$ <span id="dashLucro">0</span></div>
</div>

<div class="container">

<!-- OS -->
<div class="card">
<h2>Nova OS</h2>
<input id="cliente" placeholder="Cliente">
<input id="telefone" placeholder="Telefone">
<input id="aparelho" placeholder="Aparelho">
<input id="defeito" placeholder="Defeito">
<input id="valor" type="number" placeholder="Valor">
<input id="garantia" placeholder="Garantia dias">
<select id="status">
<option>Em andamento</option>
<option>Concluído</option>
</select>
<button onclick="criarOS()">Salvar OS</button>
<h3>Lista OS</h3>
<div id="listaOS"></div>
</div>

<!-- Estoque -->
<div class="card">
<h2>Estoque</h2>
<input id="produto" placeholder="Produto">
<input id="quantidade" type="number" placeholder="Quantidade">
<input id="preco" type="number" placeholder="Preço">
<button onclick="addEstoque()">Adicionar</button>
<h3>Lista Estoque</h3>
<div id="listaEstoque"></div>
</div>

<!-- Venda -->
<div class="card">
<h2>Venda</h2>
<input id="clienteVenda" placeholder="Cliente">
<input id="produtoVenda" placeholder="Produto">
<input id="quantidadeVenda" type="number" placeholder="Quantidade">
<button onclick="realizarVenda()">Vender</button>
</div>

<!-- Despesa -->
<div class="card">
<h2>Despesa</h2>
<input id="descricaoDespesa" placeholder="Descrição">
<input id="valorDespesa" type="number" placeholder="Valor">
<button onclick="addDespesa()">Adicionar</button>
</div>

</div>

<script>

/* ================= OS ================= */

async function criarOS(){
await fetch("/os",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
cliente:cliente.value,
telefone:telefone.value,
aparelho:aparelho.value,
defeito:defeito.value,
valor:Number(valor.value),
garantia:garantia.value,
status:status.value
})
});
carregarOS();
carregarDashboard();
}

async function carregarOS(){
const res=await fetch("/os");
const dados=await res.json();
listaOS.innerHTML="";
dados.forEach(os=>{
listaOS.innerHTML+=`
<div class="list-item">
${os.cliente} - ${os.aparelho} - R$ ${os.valor}
<br>
<button onclick="window.open('/os/${os._id}/pdf')">PDF</button>
<button onclick="editarOS('${os._id}','${os.cliente}','${os.telefone}','${os.aparelho}','${os.defeito}','${os.valor}','${os.garantia}','${os.status}')">Editar</button>
</div>`;
});
}

async function editarOS(id,cliente,telefone,aparelho,defeito,valor,garantia,status){
const novoCliente=prompt("Cliente:",cliente);
const novoTelefone=prompt("Telefone:",telefone);
const novoAparelho=prompt("Aparelho:",aparelho);
const novoDefeito=prompt("Defeito:",defeito);
const novoValor=prompt("Valor:",valor);
const novaGarantia=prompt("Garantia:",garantia);
const novoStatus=prompt("Status:",status);

await fetch("/os/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
cliente:novoCliente,
telefone:novoTelefone,
aparelho:novoAparelho,
defeito:novoDefeito,
valor:Number(novoValor),
garantia:novaGarantia,
status:novoStatus
})
});
carregarOS();
carregarDashboard();
}

/* ================= ESTOQUE ================= */

async function addEstoque(){
await fetch("/estoque",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
produto:produto.value,
quantidade:Number(quantidade.value),
preco:Number(preco.value)
})
});
carregarEstoque();
}

async function carregarEstoque(){
const res=await fetch("/estoque");
const dados=await res.json();
listaEstoque.innerHTML="";
dados.forEach(item=>{
listaEstoque.innerHTML+=`
<div class="list-item">
${item.produto} - ${item.quantidade} un - R$ ${item.preco}
<br>
<button onclick="editarEstoque('${item._id}','${item.produto}','${item.quantidade}','${item.preco}')">Editar</button>
</div>`;
});
}

async function editarEstoque(id,produto,quantidade,preco){
const novoProduto=prompt("Produto:",produto);
const novaQuantidade=prompt("Quantidade:",quantidade);
const novoPreco=prompt("Preço:",preco);

await fetch("/estoque/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
produto:novoProduto,
quantidade:Number(novaQuantidade),
preco:Number(novoPreco)
})
});
carregarEstoque();
}

/* ================= VENDA ================= */

async function realizarVenda(){
await fetch("/venda",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
cliente:clienteVenda.value,
produto:produtoVenda.value,
quantidade:Number(quantidadeVenda.value)
})
});
carregarEstoque();
carregarDashboard();
}

/* ================= DESPESA ================= */

async function addDespesa(){
await fetch("/despesas",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
descricao:descricaoDespesa.value,
valor:Number(valorDespesa.value)
})
});
carregarDashboard();
}

/* ================= DASHBOARD ================= */

async function carregarDashboard(){
const res=await fetch("/dashboard");
const dados=await res.json();
dashOS.innerText=dados.totalOS;
dashVendas.innerText=dados.totalVendas;
dashDespesas.innerText=dados.totalDespesas;
dashLucro.innerText=dados.lucro;
}

/* ================= INIT ================= */

carregarOS();
carregarEstoque();
carregarDashboard();

</script>

</body>
</html>
