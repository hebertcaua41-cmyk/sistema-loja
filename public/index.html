<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HS Cell</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;background:#0f172a;color:white;font-family:Arial}
.container{padding:15px}
.card{background:#1e293b;padding:15px;margin-bottom:10px;border-radius:10px}
button{padding:10px;width:100%;margin-top:5px;background:#3b82f6;color:white;border:none}
input{width:100%;padding:10px;margin:5px 0;background:#020617;color:white;border:none}
</style>
</head>

<body>

<div id="login">
<h2>Login</h2>
<input id="user">
<input id="pass" type="password">
<button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none" class="container">

<div class="card">
<h3>Financeiro</h3>
<p>Vendas: <span id="v"></span></p>
<p>Despesas: <span id="d"></span></p>
<p>Lucro: <span id="l"></span></p>
</div>

<div class="card">
<h3>Usuários</h3>
<input id="nu"><input id="ns">
<button onclick="criarUser()">Criar</button>
<div id="lu"></div>
</div>

</div>

<script>
let token=""

async function api(url,method="GET",body){
 return fetch(url,{
  method,
  headers:{
   "Content-Type":"application/json",
   "Authorization":token
  },
  body: body?JSON.stringify(body):undefined
 }).then(r=>r.json())
}

async function login(){
 const r = await fetch("/login",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({usuario:user.value,senha:pass.value})
 }).then(r=>r.json())

 token=r.token
 document.getElementById("login").style.display="none"
 document.getElementById("app").style.display="block"

 carregar()
}

async function carregar(){
 const f = await api("/financeiro")
 v.innerText=f.vendas
 d.innerText=f.despesas
 l.innerText=f.lucroLiquido

 const u = await api("/usuarios")
 lu.innerHTML=""
 u.forEach(x=>{
  lu.innerHTML+=`<div>${x.usuario}</div>`
 })
}

async function criarUser(){
 await api("/usuarios","POST",{usuario:nu.value,senha:ns.value})
 carregar()
}
</script>

</body>
</html>
