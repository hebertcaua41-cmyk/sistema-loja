<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HS Cell Imports</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#0f172a;
  color:#fff;
}

.container{
  display:flex;
  min-height:100vh;
}

/* SIDEBAR */

.sidebar{
  width:220px;
  background:#111827;
  padding:20px;
}

.sidebar h2{
  text-align:center;
  margin-bottom:30px;
}

.sidebar button{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  background:#1f2937;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}

.sidebar button:hover{
  background:#2563eb;
}

/* MAIN */

.main{
  flex:1;
  padding:25px;
}

.section{
  display:none;
}

.active{
  display:block;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 4px 15px rgba(0,0,0,0.4);
}

.card h3{
  margin-top:0;
}

input, select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:8px;
  background:#334155;
  color:#fff;
}

button.action{
  background:#2563eb;
  color:white;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
  transition:0.2s;
}

button.action:hover{
  background:#1d4ed8;
}

.stat{
  font-size:22px;
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
  <h2>📱 HS Cell</h2>
  <button onclick="show('dashboard')">📊 Dashboard</button>
  <button onclick="show('os')">🛠 Ordens</button>
  <button onclick="show('estoque')">📦 Estoque</button>
  <button onclick="show('vendas')">💰 Vendas</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="section active">

  <div class="card">
    <h3>Ordens de Serviço</h3>
    <div class="stat" id="totalOS">0</div>
  </div>

  <div class="card">
    <h3>Total em Vendas</h3>
    <div class="stat" id="totalVendas">R$ 0</div>
  </div>

  <div class="card">
    <h3>Produtos no Estoque</h3>
    <div class="stat" id="totalEstoque">0</div>
  </div>

</div>

<!-- OS -->
<div id="os" class="section">
  <div class="card">
    <h3>Nova OS</h3>
    <input id="cliente" placeholder="Cliente">
    <input id="telefone" placeholder="Telefone">
    <input id="aparelho" placeholder="Aparelho">
    <input id="defeito" placeholder="Defeito">
    <input id="valor" placeholder="Valor">
    <input id="garantia" placeholder="Garantia dias">
    <select id="status">
      <option>Em andamento</option>
      <option>Pronto</option>
      <option>Entregue</option>
    </select>
    <button class="action" onclick="criarOS()">Salvar</button>
  </div>

  <div id="listaOS"></div>
</div>

<!-- ESTOQUE -->
<div id="estoque" class="section">
  <div class="card">
    <h3>Novo Produto</h3>
    <input id="produto" placeholder="Produto">
    <input id="quantidade" placeholder="Quantidade">
    <input id="preco" placeholder="Preço">
    <button class="action" onclick="addEstoque()">Adicionar</button>
  </div>

  <div id="listaEstoque"></div>
</div>

<!-- VENDAS -->
<div id="vendas" class="section">
  <div class="card">
    <h3>Nova Venda</h3>
    <input id="vProduto" placeholder="Produto">
    <input id="vQuantidade" placeholder="Quantidade">
    <button class="action" onclick="vender()">Registrar</button>
  </div>

  <div id="listaVendas"></div>
</div>

</div>
</div>

<script>
function show(id){
  document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ================= OS ================= */

async function criarOS(){
  await fetch("/os",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      cliente:cliente.value,
      telefone:telefone.value,
      aparelho:aparelho.value,
      defeito:defeito.value,
      valor:Number(valor.value),
      garantia:garantia.value,
      status:status.value
    })
  });
  carregarOS();
}

async function carregarOS(){
  const res = await fetch("/os");
  const dados = await res.json();
  totalOS.innerText = dados.length;

  listaOS.innerHTML="";
  dados.forEach(os=>{
    listaOS.innerHTML+=`
    <div class="card">
      <b>${os.cliente}</b> - ${os.aparelho}<br>
      Status: ${os.status} <br>
      R$ ${os.valor}
      <br><br>
      <button class="action" onclick="window.open('/os/${os._id}/pdf')">Gerar PDF</button>
    </div>`;
  });
}

/* ================= ESTOQUE ================= */

async function addEstoque(){
  await fetch("/estoque",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      produto:produto.value,
      quantidade:Number(quantidade.value),
      preco:Number(preco.value)
    })
  });
  carregarEstoque();
}

async function carregarEstoque(){
  const res = await fetch("/estoque");
  const dados = await res.json();
  totalEstoque.innerText = dados.length;

  listaEstoque.innerHTML="";
  dados.forEach(p=>{
    listaEstoque.innerHTML+=`
    <div class="card">
      ${p.produto} <br>
      Qtd: ${p.quantidade} <br>
      R$ ${p.preco}
    </div>`;
  });
}

/* ================= VENDAS ================= */

async function vender(){
  await fetch("/venda",{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body:JSON.stringify({
      produto:vProduto.value,
      quantidade:Number(vQuantidade.value)
    })
  });
  carregarVendas();
  carregarEstoque();
}

async function carregarVendas(){
  const res = await fetch("/vendas");
  const dados = await res.json();

  let total=0;
  dados.forEach(v=> total+=v.valor);

  totalVendas.innerText="R$ "+total;

  listaVendas.innerHTML="";
  dados.forEach(v=>{
    listaVendas.innerHTML+=`
    <div class="card">
      ${v.produto} - ${v.quantidade} un <br>
      Total: R$ ${v.valor}
    </div>`;
  });
}

/* INIT */
carregarOS();
carregarEstoque();
carregarVendas();

</script>

</body>
</html>
