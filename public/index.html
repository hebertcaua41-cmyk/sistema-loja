<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h2>Dashboard</h2>
<canvas id="grafico"></canvas>

<script>
let token=""

async function api(url){
 return fetch(url,{headers:{Authorization:token}}).then(r=>r.json())
}

async function grafico(){
 const d=await api("/dashboard/mensal")

 new Chart(document.getElementById("grafico"),{
  type:"line",
  data:{
   labels:d.labels,
   datasets:[{label:"Vendas",data:d.valores}]
  }
 })
}

grafico()
</script>

</body>
</html>
