<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HS Cell Imports</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f4f6f9;
}

header{
  background:#111;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

nav{
  display:flex;
  justify-content:space-around;
  background:#222;
}

nav button{
  flex:1;
  padding:12px;
  border:none;
  background:#222;
  color:white;
  cursor:pointer;
}

nav button:hover{
  background:#444;
}

section{
  display:none;
  padding:20px;
}

section.active{
  display:block;
}

input, select{
  width:100%;
  padding:8px;
  margin-bottom:10px;
}

button.salvar{
  background:#28a745;
  color:white;
  border:none;
  padding:10px;
  width:100%;
  cursor:pointer;
}

table{
  width:100%;
  background:white;
  border-collapse:collapse;
  margin-top:20px;
}

th,td{
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
}
</style>
</head>
<body>

<header>📱 HS Cell Imports - Sistema</header>

<nav>
  <button onclick="abrir('os')">OS</button>
  <button onclick="abrir('estoque')">Estoque</button>
  <button onclick="abrir('dashboard')">Dashboard</button>
</nav>

<!-- OS -->
<section id="os" class="active">
<h3>Nova Ordem de Serviço</h3>

<input id="cliente" placeholder="Nome do cliente">
<input id="telefone" placeholder="Telefone">
<input id="aparelho" placeholder="Aparelho">
<input id="defeito" placeholder="Defeito">
<input id="valor" type="number" placeholder="Valor">
<input id="garantia" placeholder="Garantia">
<select id="status">
  <option>Em andamento</option>
  <option>Pronto</option>
  <option>Entregue</option>
</select>

<button class="salvar" onclick="salvarOS()">Salvar OS</button>

<h3>Ordens</h3>
<table>
<thead>
<tr>
<th>Cliente</th>
<th>Aparelho</th>
<th>Valor</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="listaOS"></tbody>
</table>
</section>

<!-- ESTOQUE -->
<section id="estoque">
<h3>Novo Produto</h3>

<input id="nomeProduto" placeholder="Nome">
<input id="quantidadeProduto" type="number" placeholder="Quantidade">
<input id="precoProduto" type="number" placeholder="Preço Venda">

<button class="salvar" onclick="salvarProduto()">Salvar Produto</button>

<h3>Produtos</h3>
<table>
<thead>
<tr>
<th>Nome</th>
<th>Qtd</th>
<th>Preço</th>
</tr>
</thead>
<tbody id="listaEstoque"></tbody>
</table>
</section>

<!-- DASHBOARD -->
<section id="dashboard">
<h3>Resumo do Mês</h3>
<p><b>Vendas:</b> R$ <span id="vendas"></span></p>
<p><b>Despesas:</b> R$ <span id="despesas"></span></p>
<p><b>Lucro:</b> R$ <span id="lucro"></span></p>
</section>

<script>

/* ===== MENU ===== */
function abrir(sec){
  document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
  document.getElementById(sec).classList.add("active");
  if(sec==="dashboard") carregarDashboard();
}

/* ===== OS ===== */

async function salvarOS(){

  const dados = {
    cliente: document.getElementById("cliente").value,
    telefone: document.getElementById("telefone").value,
    aparelho: document.getElementById("aparelho").value,
    defeito: document.getElementById("defeito").value,
    valor: Number(document.getElementById("valor").value),
    garantia: document.getElementById("garantia").value,
    status: document.getElementById("status").value
  };

  const response = await fetch("/os",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(dados)
  });

  if(response.ok){
    alert("OS salva com sucesso!");
    carregarOS();
  }else{
    alert("Erro ao salvar");
  }
}

async function carregarOS(){
  const res = await fetch("/os");
  const lista = await res.json();

  const tbody = document.getElementById("listaOS");
  tbody.innerHTML="";

  lista.forEach(os=>{
    tbody.innerHTML += `
      <tr>
        <td>${os.cliente}</td>
        <td>${os.aparelho}</td>
        <td>R$ ${os.valor}</td>
        <td>${os.status}</td>
        <td>
          <button onclick="gerarPDF('${os._id}')">PDF</button>
          <button onclick="excluirOS('${os._id}')">Excluir</button>
        </td>
      </tr>
    `;
  });
}

function gerarPDF(id){
  window.open(`/os/${id}/pdf`,"_blank");
}

async function excluirOS(id){
  await fetch(`/os/${id}`,{method:"DELETE"});
  carregarOS();
}

/* ===== ESTOQUE ===== */

async function salvarProduto(){
  const dados={
    nome: document.getElementById("nomeProduto").value,
    quantidade: Number(document.getElementById("quantidadeProduto").value),
    precoVenda: Number(document.getElementById("precoProduto").value)
  };

  await fetch("/estoque",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(dados)
  });

  carregarEstoque();
}

async function carregarEstoque(){
  const res = await fetch("/estoque");
  const lista = await res.json();

  const tbody = document.getElementById("listaEstoque");
  tbody.innerHTML="";

  lista.forEach(p=>{
    tbody.innerHTML += `
      <tr>
        <td>${p.nome}</td>
        <td>${p.quantidade}</td>
        <td>R$ ${p.precoVenda}</td>
      </tr>
    `;
  });
}

/* ===== DASHBOARD ===== */

async function carregarDashboard(){
  const res = await fetch("/dashboard");
  const data = await res.json();

  document.getElementById("vendas").innerText=data.vendas||0;
  document.getElementById("despesas").innerText=data.despesas||0;
  document.getElementById("lucro").innerText=data.lucro||0;
}

/* INIT */
carregarOS();
carregarEstoque();

</script>

</body>
</html>
