<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>HS Cell Imports</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  margin: 0;
}

header {
  background: #00c853;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

nav {
  display: flex;
  justify-content: space-around;
  background: #222;
  padding: 10px;
}

nav button {
  background: #00c853;
  border: none;
  padding: 10px;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}

section {
  padding: 20px;
  display: none;
}

input, select {
  padding: 8px;
  margin: 5px 0;
  width: 100%;
}

button {
  padding: 8px;
  margin-top: 5px;
  background: #00c853;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}

.card {
  background: #222;
  padding: 10px;
  margin-top: 10px;
  border-radius: 5px;
}
</style>
</head>
<body>

<header>📱 HS Cell Imports</header>

<nav>
<button onclick="mostrar('dashboard')">Dashboard</button>
<button onclick="mostrar('os')">OS</button>
<button onclick="mostrar('estoque')">Estoque</button>
<button onclick="mostrar('venda')">Venda</button>
</nav>

<!-- DASHBOARD -->
<section id="dashboard">
<h2>📊 Dashboard</h2>
<div id="dadosDashboard"></div>
</section>

<!-- OS -->
<section id="os">
<h2>📋 Nova Ordem de Serviço</h2>

<input id="cliente" placeholder="Cliente">
<input id="telefone" placeholder="Telefone">
<input id="aparelho" placeholder="Aparelho">
<input id="defeito" placeholder="Defeito">
<input id="valor" placeholder="Valor">
<input id="garantia" placeholder="Garantia (dias)">
<button onclick="criarOS()">Salvar OS</button>

<h3>Lista de OS</h3>
<div id="listaOS"></div>
</section>

<!-- ESTOQUE -->
<section id="estoque">
<h2>📦 Estoque</h2>

<input id="produto" placeholder="Produto">
<input id="quantidade" placeholder="Quantidade">
<input id="preco" placeholder="Preço">
<button onclick="adicionarEstoque()">Adicionar</button>

<h3>Consultar Estoque</h3>
<div id="listaEstoque"></div>
</section>

<!-- VENDA -->
<section id="venda">
<h2>💰 Nova Venda</h2>

<input id="clienteVenda" placeholder="Cliente">
<input id="produtoVenda" placeholder="Produto">
<input id="quantidadeVenda" placeholder="Quantidade">
<button onclick="fazerVenda()">Vender</button>

<h3>Histórico</h3>
<div id="listaVendas"></div>
</section>

<script>

function mostrar(secao){
  document.querySelectorAll("section").forEach(s=>s.style.display="none");
  document.getElementById(secao).style.display="block";
}

mostrar("dashboard");

async function carregarDashboard(){
  const res = await fetch("/dashboard");
  const data = await res.json();

  document.getElementById("dadosDashboard").innerHTML = `
    OS abertas: ${data.totalOS} <br>
    Total Vendas: R$ ${data.totalVendas} <br>
    Despesas: R$ ${data.totalDespesas} <br>
    Lucro: R$ ${data.lucro}
  `;
}

async function criarOS(){
  await fetch("/os",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      cliente:cliente.value,
      telefone:telefone.value,
      aparelho:aparelho.value,
      defeito:defeito.value,
      valor:Number(valor.value),
      garantia:garantia.value,
      status:"Em andamento"
    })
  });
  carregarOS();
}

async function carregarOS(){
  const res = await fetch("/os");
  const lista = await res.json();

  listaOS.innerHTML="";
  lista.forEach(os=>{
    listaOS.innerHTML+=`
      <div class="card">
        ${os.cliente} - ${os.aparelho} - R$ ${os.valor}
        <br>
        <button onclick="gerarPDF('${os._id}')">PDF</button>
      </div>
    `;
  });
}

function gerarPDF(id){
  window.open("/os/"+id+"/pdf","_blank");
}

async function adicionarEstoque(){
  await fetch("/estoque",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      produto:produto.value,
      quantidade:Number(quantidade.value),
      preco:Number(preco.value)
    })
  });
  carregarEstoque();
}

async function carregarEstoque(){
  const res = await fetch("/estoque");
  const lista = await res.json();

  listaEstoque.innerHTML="";
  lista.forEach(item=>{
    listaEstoque.innerHTML+=`
      <div class="card">
        ${item.produto} - ${item.quantidade} unidades - R$ ${item.preco}
      </div>
    `;
  });
}

async function fazerVenda(){
  await fetch("/venda",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      cliente:clienteVenda.value,
      produto:produtoVenda.value,
      quantidade:Number(quantidadeVenda.value)
    })
  });
  carregarVendas();
  carregarEstoque();
  carregarDashboard();
}

async function carregarVendas(){
  const res = await fetch("/vendas");
  const lista = await res.json();

  listaVendas.innerHTML="";
  lista.forEach(v=>{
    listaVendas.innerHTML+=`
      <div class="card">
        ${v.cliente} - ${v.produto} - R$ ${v.total}
      </div>
    `;
  });
}

carregarDashboard();
carregarOS();
carregarEstoque();
carregarVendas();

</script>

</body>
</html>
