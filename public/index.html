<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistema Assistência Técnica</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  padding: 20px;
}

h1 {
  text-align: center;
}

form {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
}

input, button {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

.card {
  background: white;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<h1>📱 Sistema Assistência Técnica</h1>

<form id="form">
<input type="text" id="cliente" placeholder="Cliente" required>
<input type="text" id="telefone" placeholder="Telefone" required>
<input type="text" id="aparelho" placeholder="Aparelho" required>
<input type="text" id="defeito" placeholder="Defeito" required>
<input type="number" id="valorServico" placeholder="Valor Serviço" required>
<input type="number" id="custoPeca" placeholder="Custo Peça" required>
<input type="number" id="garantiaDias" placeholder="Garantia (dias)">
<button type="submit">Salvar Ordem</button>
</form>

<button onclick="carregarOrdens()">🔄 Atualizar Lista</button>

<div id="lista"></div>

<script>
const API = window.location.origin;

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const ordem = {
    cliente: document.getElementById("cliente").value,
    telefone: document.getElementById("telefone").value,
    aparelho: document.getElementById("aparelho").value,
    defeito: document.getElementById("defeito").value,
    valorServico: Number(document.getElementById("valorServico").value),
    custoPeca: Number(document.getElementById("custoPeca").value),
    garantiaDias: Number(document.getElementById("garantiaDias").value)
  };

  await fetch(`${API}/ordens`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(ordem)
  });

  document.getElementById("form").reset();
  carregarOrdens();
});

async function carregarOrdens() {
  const res = await fetch(`${API}/ordens`);
  const ordens = await res.json();

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  ordens.forEach(ordem => {

    const garantia = ordem.dataGarantia
      ? new Date(ordem.dataGarantia).toLocaleDateString()
      : "Sem garantia";

    lista.innerHTML += `
      <div class="card">
        <strong>${ordem.cliente}</strong><br>
        📱 ${ordem.aparelho}<br>
        🔧 ${ordem.defeito}<br>
        💰 Lucro: R$ ${ordem.lucro}<br>
        🛡 Garantia até: ${garantia}<br>
        📌 Status: ${ordem.status}
      </div>
    `;
  });
}

carregarOrdens();
</script>

</body>
</html>
